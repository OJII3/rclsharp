name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  dotnet:
    name: .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Check Unity meta files
        run: bash scripts/check_unity_meta.sh

      - name: Restore
        run: dotnet restore rclsharp.sln

      - name: Build
        run: dotnet build rclsharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/rclsharp.Tests/rclsharp.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/rclsharp/rclsharp.csproj --configuration Release --no-build --output artifacts/packages
